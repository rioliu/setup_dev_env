palette = 'catppuccin_mocha'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Macos = "¾░ĆĄ"
Windows = "Ņ£Å"
Ubuntu = "¾░Ģł"
Debian = "¾░ŻÜ"
Arch = "¾░Żć"
Fedora = "¾░Żø"
Linux = "¾░īĮ"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "bg:green"
detect_extensions = ["js", "ts", "jsx", "tsx", "mjs", "cjs"]
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[bun]
symbol = "ŅØ»"
style = "bg:green"
detect_extensions = ["js", "ts", "jsx", "tsx", "mjs"]
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "Ņś× "
style = "bg:green"
detect_extensions = ["c", "h"]
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:green"
detect_extensions = ["rs"]
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "Ņś¦"
style = "bg:green"
detect_extensions = ["go"]
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "Ņśł"
style = "bg:green"
detect_extensions = ["php"]
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "Ņē¢ "
style = "bg:green"
detect_extensions = ["java"]
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "Ņś┤"
style = "bg:green"
detect_extensions = ["kt", "kts"]
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "Ņś¤"
style = "bg:green"
detect_extensions = ["hs"]
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "Ņśå"
style = "bg:green"
detect_extensions = ["py"]
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = "’īł"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[conda]
symbol = " ’äī "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = true

[cmd_duration]
show_milliseconds = true
format = "Ņ½┤ in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[character]
success_symbol = '[ŌØ»](bold fg:green)'
error_symbol = '[ŌØ»](bold fg:red)'
vimcmd_symbol = '[ŌØ«](bold fg:green)'
vimcmd_replace_one_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ŌØ«](bold fg:yellow)'

