"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ŅéČ](red)\
$os\
$username\
[Ņé░](bg:peach fg:red)\
$directory\
[Ņé░](bg:yellow fg:peach)\
$git_branch\
$git_status\
[Ņé░](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[Ņé░](fg:green bg:sapphire)\
$conda\
[Ņé░](fg:sapphire bg:lavender)\
